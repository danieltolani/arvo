  <script>
    const names = ['The Dreamer', 'The Saver', 'The Investor', 'The Provider'];
    const videos = document.querySelectorAll('.char-video');
    const dots   = document.querySelectorAll('.char-dot');

    // iOS Safari requires explicit play() for autoplay with <source> tags
    videos.forEach(v => v.play().catch(() => {}));
    const nameEl = document.getElementById('char-name');
    let current  = 0;

    function goTo(index) {
      videos[current].classList.remove('active');
      dots[current].classList.remove('active');
      current = ((index % names.length) + names.length) % names.length;
      videos[current].classList.add('active');
      dots[current].classList.add('active');
      videos[current].play().catch(() => {});
      nameEl.style.opacity = '0';
      setTimeout(() => {
        nameEl.textContent = names[current];
        nameEl.style.opacity = '1';
      }, 180);
    }

    document.getElementById('char-prev').addEventListener('click', () => goTo(current - 1));
    document.getElementById('char-next').addEventListener('click', () => goTo(current + 1));
    dots.forEach(dot => dot.addEventListener('click', () => goTo(+dot.dataset.index)));

    (function(){
      var btn = document.querySelector('.nav__hamburger');
      var links = document.querySelector('.nav__links');
      var nav = document.getElementById('site-nav');
      btn.addEventListener('click', function(){
        var open = links.classList.toggle('open');
        btn.classList.toggle('open', open);
        nav.classList.toggle('nav--open', open);
        btn.setAttribute('aria-expanded', open);
      });
    })();
